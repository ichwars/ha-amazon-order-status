# Service definitions for Amazon Order Status
# https://developers.home-assistant.io/docs/dev_101_services

purge_order:
  description: Remove a specific order from tracking. The order will no longer appear in the sensors.
  fields:
    order_id:
      description: The Amazon order number to remove (e.g. 123-4567890-1234567). Copy from sensor attributes.
      required: true
      example: "123-4567890-1234567"
      selector:
        text:
    config_entry_id:
      description: Optional Home Assistant config entry ID. Leave empty to purge from all loaded Amazon Order Status entries.
      required: false
      selector:
        text:

rescan:
  description: Rescan Amazon order emails over a configurable lookback period.
  fields:
    days:
      description: Number of days to scan back from now.
      required: false
      default: 14
      example: 30
      selector:
        number:
          min: 1
          max: 365
          mode: box
    clear_existing:
      description: Clear tracked orders before scanning.
      required: false
      default: false
      selector:
        boolean: {}
    config_entry_id:
      description: Optional Home Assistant config entry ID. Leave empty to rescan all loaded Amazon Order Status entries.
      required: false
      selector:
        text:

set_status:
  description: Set a manual status for one tracked order or one shipment within an order.
  fields:
    order_id:
      description: The Amazon order number to update (e.g. 123-4567890-1234567).
      required: true
      example: "123-4567890-1234567"
      selector:
        text:
    status:
      description: Manual order or shipment status to apply. Partially delivered is an order rollup status and is not valid with shipment_id.
      required: true
      example: Delivered
      selector:
        select:
          options:
            - Ordered
            - Shipped
            - Out for delivery
            - Delivery attempted
            - Pickup ready
            - Delayed
            - Delivery problem
            - Undeliverable
            - Partially delivered
            - Delivered
            - Canceled
            - Return started
            - Refunded
            - Ignored
    shipment_id:
      description: Optional shipment ID to update only one shipment from the order. Leave empty to update the whole order.
      required: false
      example: "123-4567890-1234567:default"
      selector:
        text:
    config_entry_id:
      description: Optional Home Assistant config entry ID. Leave empty to update matching orders across all loaded Amazon Order Status entries.
      required: false
      selector:
        text:

mark_delivered:
  description: Mark one tracked order or one shipment as delivered manually.
  fields:
    order_id:
      description: The Amazon order number to mark as delivered (e.g. 123-4567890-1234567).
      required: true
      example: "123-4567890-1234567"
      selector:
        text:
    shipment_id:
      description: Optional shipment ID to mark only one shipment as delivered. Leave empty to update the whole order.
      required: false
      example: "123-4567890-1234567:default"
      selector:
        text:
    delivered_at:
      description: Optional ISO date/time to store with the manual delivery update, for example 2026-06-27 or 2026-06-27 18:30.
      required: false
      example: "2026-06-27T18:30:00+02:00"
      selector:
        text:
    config_entry_id:
      description: Optional Home Assistant config entry ID. Leave empty to update matching orders across all loaded Amazon Order Status entries.
      required: false
      selector:
        text:

ignore_order:
  description: Ignore one tracked order or one shipment so it no longer counts in active workflow sensors.
  fields:
    order_id:
      description: The Amazon order number to ignore (e.g. 123-4567890-1234567).
      required: true
      example: "123-4567890-1234567"
      selector:
        text:
    shipment_id:
      description: Optional shipment ID to ignore only one shipment. Leave empty to ignore the whole order.
      required: false
      example: "123-4567890-1234567:default"
      selector:
        text:
    config_entry_id:
      description: Optional Home Assistant config entry ID. Leave empty to update matching orders across all loaded Amazon Order Status entries.
      required: false
      selector:
        text:

restore_order:
  description: Restore one ignored order or shipment so it returns to normal workflow tracking.
  fields:
    order_id:
      description: The Amazon order number to restore (e.g. 123-4567890-1234567).
      required: true
      example: "123-4567890-1234567"
      selector:
        text:
    shipment_id:
      description: Optional shipment ID to restore only one shipment. Leave empty to restore the whole order.
      required: false
      example: "123-4567890-1234567:default"
      selector:
        text:
    config_entry_id:
      description: Optional Home Assistant config entry ID. Leave empty to update matching orders across all loaded Amazon Order Status entries.
      required: false
      selector:
        text:
